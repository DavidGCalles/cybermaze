
version: "3.8"
services:
  client:
    image: nginx:alpine
    container_name: cybermaze_client
    ports:
      - "8080:80"
    volumes:
      - ./cybermazeJS:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped