
services:
  cybermaze-front:
    image: nginx:alpine
    container_name: cybermaze_front
    ports:
      - "8080:80"
    volumes:
      - ./cybermaze-front:/usr/share/nginx/html:ro
      - ./nginx.front.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - cybermaze-crud
      - cybermaze-sim
    labels:
      - "service.type=new-frontend"

  cybermaze-js:
    image: nginx:alpine
    container_name: cybermaze_js_legacy
    ports:
      - "8081:80"
    volumes:
      - ./cybermazeJS:/usr/share/nginx/html:ro
      - ./nginx.legacy.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "legacy.name=cybermaze-JS"

  cybermaze-db:
    image: postgres:15-alpine
    container_name: cybermaze_db
    env_file:
      - .env
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped

  cybermaze-crud:
    build:
      context: ./api
    container_name: cybermaze_crud
    working_dir: /app
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - cybermaze-db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cybermaze-sim:
    build:
      context: ./sim
    container_name: cybermaze_sim
    working_dir: /usr/src/sim
    env_file:
      - .env
    ports:
      - "4000:4000"
    restart: unless-stopped
    depends_on:
      - cybermaze-db
      - cybermaze-crud
