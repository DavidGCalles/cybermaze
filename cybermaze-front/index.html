<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cybermaze - Dummy Frontend</title>
  <style>
    body { font-family: sans-serif; background-color: #111; color: #eee; }
    #canvas-container { width: 80vw; height: 80vh; border: 1px solid #333; }
  </style>
</head>
<body>
  <h1>Cybermaze — Pixi Renderer Frontend</h1>
  <p>This frontend renders the world state received from the simulator via WebSocket using PixiJS.</p>

  <div id="canvas-container"></div>

  <!-- PixiJS (release) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <!-- Renderer logic (dumb view) -->
  <script src="UIManager.js"></script>
  <script src="MapManager.js"></script>
  <script src="EntityManager.js"></script>
  <script src="pixiRenderer.js"></script>
  <!-- WebSocket client (forwards payloads to renderer) -->
  <script src="wsClient.js"></script>
  </body>
  </html>
